<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1f38"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(201,125,29,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="230" r="180" fill="url(#glow)"/>
  <!-- Seed of Life — sacred geometry -->
  <g stroke="#c97d1d" fill="none" stroke-width="2.5" opacity="0.6">
    <circle cx="256" cy="230" r="68"/>
    <circle cx="256" cy="162" r="68"/>
    <circle cx="256" cy="298" r="68"/>
    <circle cx="197.1" cy="196" r="68"/>
    <circle cx="314.9" cy="196" r="68"/>
    <circle cx="197.1" cy="264" r="68"/>
    <circle cx="314.9" cy="264" r="68"/>
  </g>
  <!-- Outer ring -->
  <circle cx="256" cy="230" r="105" stroke="#c97d1d" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Inner ring -->
  <circle cx="256" cy="230" r="30" stroke="#e8a830" stroke-width="1" fill="none" opacity="0.35"/>
  <!-- Central dot -->
  <circle cx="256" cy="230" r="4" fill="#e8a830"/>
  <!-- obiDesk text -->
  <text x="256" y="408" text-anchor="middle" font-family="Georgia, 'Palatino', serif" font-size="44" font-weight="700" letter-spacing="3" fill="#c97d1d" opacity="0.95">obiDesk</text>
  <!-- Tagline -->
  <text x="256" y="448" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#8a7d6a" opacity="0.7">from signboard to system</text>
</svg>
