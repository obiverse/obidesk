<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field Capture — obiDesk</title>
<meta name="theme-color" content="#c97d1d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
</head>
<body>
<canvas id="bg-canvas"></canvas>
<nav class="site-nav" id="site-nav"></nav>

<section class="hero" style="grid-template-columns:1fr auto;padding-bottom:1vh;">
  <div class="hero-left">
    <h1>Field Capture</h1>
    <p class="tagline">Walk Abuja. Photograph signboards. Capture businesses. Build the directory.</p>
  </div>
  <div class="hero-right">
    <div class="hero-stat-label">Queued</div>
    <div class="hero-stat-value" id="queue-badge">0</div>
    <div class="hero-stat-sub">captures</div>
  </div>
</section>

<div class="section reveal" style="max-width:640px;padding-top:0;">
  <div style="padding:1.4rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);">

    <div class="form-grid" id="field-form">
      <div class="form-full">
        <label class="form-label">Business Name *</label>
        <input class="form-input" id="fc-name" placeholder="Name from signboard" style="font-size:1rem;">
      </div>
      <div>
        <label class="form-label">Category *</label>
        <div class="styled-select">
          <select id="fc-category">
            <option value="">Select category</option>
          </select>
        </div>
      </div>
      <div>
        <label class="form-label">Area *</label>
        <div class="styled-select">
          <select id="fc-area">
            <option value="">Select area</option>
          </select>
        </div>
      </div>
      <div class="form-full">
        <label class="form-label">Address / Landmark</label>
        <input class="form-input" id="fc-address" placeholder="Street, landmark">
      </div>
      <div class="form-full">
        <label class="form-label">Phone (if visible)</label>
        <input class="form-input" id="fc-phone" placeholder="Phone from signboard" type="tel">
      </div>
      <div class="form-full">
        <label class="form-label">Signboard Photo</label>
        <label class="photo-upload" id="photo-label">
          <input type="file" id="fc-photo" accept="image/*" capture="environment" style="display:none;" onchange="onPhotoSelect(this)">
          <span class="photo-upload-icon">&#128247;</span>
          <span class="photo-upload-text" id="photo-text">Tap to take photo</span>
        </label>
      </div>
      <div class="form-full">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="fc-notes" placeholder="Hours, services visible, condition, observations..." rows="2"></textarea>
      </div>
      <div class="form-full" style="display:flex;gap:0.5rem;flex-wrap:wrap;padding-top:0.5rem;">
        <button class="obi-btn" onclick="saveCapture()">Save Offline</button>
        <button class="wa-btn" onclick="sendCapture()">Send WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<!-- Queue Section -->
<div class="section reveal" style="max-width:640px;padding-top:0.5rem;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;">
    <span class="section-label" style="margin-bottom:0;">Queued Captures <span id="queue-count" style="color:var(--text-ghost);">(0)</span></span>
    <div style="display:flex;gap:0.35rem;">
      <button class="obi-btn-outline" style="font-size:0.58rem;padding:0.3rem 0.6rem;" onclick="exportCaptures()">Export JSON</button>
      <button class="filter-clear" onclick="clearQueue()">Clear all</button>
    </div>
  </div>
  <div id="queue-list"></div>
</div>

<footer class="site-footer" id="site-footer"></footer>

<!-- Photo upload styles -->
<style>
.photo-upload {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.8rem 1rem;
  background: var(--sacred);
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.3s;
}
.photo-upload:hover {
  border-color: var(--gold);
  background: rgba(201,125,29,0.06);
}
.photo-upload.has-photo {
  border-style: solid;
  border-color: var(--gold);
}
.photo-upload-icon { font-size: 1.4rem; }
.photo-upload-text {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  color: var(--text-dim);
}
.photo-upload.has-photo .photo-upload-text { color: var(--gold); }
</style>

<script src="js/app.js"></script>
<script src="js/library.js"></script>
<script src="js/idb.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/forms.js"></script>
<script src="js/field.js"></script>
<script src="pwa.js" defer></script>
</body>
</html>
