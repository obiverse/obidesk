<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field Capture — obiDesk</title>
  <meta name="theme-color" content="#c97d1d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="site-nav" id="site-nav"></nav>

<section class="section" style="max-width:640px;">
  <h1 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--gold-bright);margin-bottom:var(--phi-8);text-shadow:0 0 60px rgba(201,125,29,0.15);">Field Capture</h1>
  <p style="font-family:var(--font-heading);font-style:italic;color:var(--text-dim);margin-bottom:var(--phi-21);font-size:13px;">Capture businesses on the go. Saves offline. Export when ready.</p>

  <div class="form-grid" id="field-form">
    <div class="form-full">
      <label class="form-label">Business Name *</label>
      <input class="form-input" id="fc-name" placeholder="Name from signboard" style="font-size:16px;">
    </div>
    <div>
      <label class="form-label">Category *</label>
      <select class="form-input" id="fc-category">
        <option value="">Select</option>
      </select>
    </div>
    <div>
      <label class="form-label">Area *</label>
      <select class="form-input" id="fc-area">
        <option value="">Select</option>
      </select>
    </div>
    <div class="form-full">
      <label class="form-label">Address / Landmark</label>
      <input class="form-input" id="fc-address" placeholder="Street, landmark">
    </div>
    <div class="form-full">
      <label class="form-label">Phone (if visible)</label>
      <input class="form-input" id="fc-phone" placeholder="Phone from signboard" type="tel">
    </div>
    <div class="form-full">
      <label class="form-label">Photo</label>
      <input class="form-input" id="fc-photo" type="file" accept="image/*" capture="environment" style="padding:var(--phi-8);">
    </div>
    <div class="form-full">
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="fc-notes" placeholder="Any observations" rows="2"></textarea>
    </div>
    <div class="form-full" style="display:flex;gap:var(--phi-8);flex-wrap:wrap;">
      <button class="obi-btn" onclick="saveCapture()">Save Offline</button>
      <button class="wa-btn" onclick="sendCapture()">Send via WhatsApp</button>
    </div>
  </div>

  <!-- Queue -->
  <div style="margin-top:var(--phi-34);padding-top:var(--phi-21);border-top:1px solid var(--color-void-border);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--phi-13);">
      <span class="section-tag">Queued Captures <span id="queue-count" style="color:var(--color-text-ghost);">(0)</span></span>
      <div style="display:flex;gap:var(--phi-5);">
        <button class="obi-btn-outline" style="font-size:10px;padding:4px 10px;" onclick="exportCaptures()">Export JSON</button>
        <button class="obi-btn-outline" style="font-size:10px;padding:4px 10px;color:var(--color-text-ghost);" onclick="clearQueue()">Clear All</button>
      </div>
    </div>
    <div id="queue-list"></div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="js/app.js"></script>
<script src="js/library.js"></script>
<script src="js/idb.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/forms.js"></script>
<script src="js/field.js"></script>
<script src="pwa.js" defer></script>
</body>
</html>
